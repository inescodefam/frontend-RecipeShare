sonar.projectKey=inescodefam_frontend-RecipeShare
sonar.organization=inescodefam

sonar.projectName=frontend-RecipeShare
sonar.sourceEncoding=UTF-8

# Monorepo Flutter sources
sonar.sources=recipeshare/apps/admin/lib,recipeshare/apps/mobile/lib,recipeshare/packages/shared/lib
sonar.tests=recipeshare/apps/mobile/test
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/build/**
sonar.test.inclusions=**/*test.dart

# Coverage produced by `flutter test --coverage` in workflow steps.
sonar.dart.lcov.reportPaths=recipeshare/apps/mobile/coverage/lcov.info

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=frontend-RecipeShare
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8