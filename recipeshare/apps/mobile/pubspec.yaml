name: mobile
description: RecipeShare mobile app (iOS & Android).
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  shared:
    path: ../../packages/shared
  go_router: ^16.2.0
  provider: ^6.1.0
  dio: ^5.9.0
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.0
  google_fonts: ^6.2.0
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  intl: ^0.19.0
  uuid: ^4.4.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
