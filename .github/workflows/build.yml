name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
      - name: Get dependencies (mobile)
        working-directory: recipeshare/apps/mobile
        run: flutter pub get
      - name: Get dependencies (admin)
        working-directory: recipeshare/apps/admin
        run: flutter pub get
      - name: Get dependencies (shared)
        working-directory: recipeshare/packages/shared
        run: flutter pub get
      - name: Build mobile debug APK
        working-directory: recipeshare/apps/mobile
        run: |
          flutter build apk --debug
      - name: Run tests with coverage (mobile)
        working-directory: recipeshare/apps/mobile
        run: flutter test --coverage
      - name: Run tests with coverage (admin)
        working-directory: recipeshare/apps/admin
        run: flutter test --coverage
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
